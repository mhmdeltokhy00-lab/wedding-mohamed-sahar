<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>دعوة كتب كتاب محمد وسحر</title>

<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap" rel="stylesheet">

<style>
:root { --gold:#d4af37; --dark:#000; --cream:#fffdf2; }

*{box-sizing:border-box}

body,html{
margin:0; padding:0;
height:100%;
font-family:'Amiri',serif;
background:#000;
color:var(--cream);
overflow:hidden;
}

/* ===== شاشة الباب ===== */
#portal{
position:fixed;
inset:0;
overflow:hidden;
z-index:999;
}

/* نصفي الباب */
.door{
position:absolute;
top:0;
width:50%;
height:100%;
background:url('gate.jpg') center/cover no-repeat;
transition:1.5s ease-in-out;
}

/* يمين / شمال */
.left{ left:0; background-position:left center; }
.right{ right:0; background-position:right center; }

/* لما يفتح */
#portal.open .left{ transform:translateX(-100%); }
#portal.open .right{ transform:translateX(100%); }

/* طبقة تعتيم */
.overlay{
position:absolute;
inset:0;
background:rgba(0,0,0,0.5);
pointer-events:none; /* مهم عشان الزرار يشتغل */
}

/* زرار الدخول */
.enter-btn{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
z-index:10;
background:transparent;
border:2px solid var(--gold);
color:var(--gold);
padding:15px 40px;
font-size:22px;
border-radius:40px;
cursor:pointer;
backdrop-filter:blur(5px);
box-shadow:0 0 20px rgba(212,175,55,.6);
}

/* ===== المحتوى ===== */
#content{
position:absolute;
inset:0;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
background:linear-gradient(rgba(0,0,0,.85),rgba(0,0,0,.95));
opacity:0;
transition:1.5s;
padding:20px;
overflow-y:auto;
}

#content.show{ opacity:1; }

.names{
font-size:3rem;
color:var(--gold);
margin:10px 0;
}

.card{
border:1px solid var(--gold);
padding:20px;
border-radius:15px;
background:rgba(255,255,255,.05);
margin:20px 0;
}

/* التايمر */
#timer{
display:flex;
gap:10px;
flex-wrap:wrap;
justify-content:center;
}

.timer-box{
border:1px solid var(--gold);
padding:10px;
border-radius:10px;
min-width:60px;
}

.timer-box span{
display:block;
font-size:20px;
color:var(--gold);
}

/* الفورم */
input{
padding:10px;
width:80%;
max-width:300px;
border-radius:8px;
border:none;
margin-top:10px;
text-align:center;
}

.confirm{
background:var(--gold);
border:none;
padding:10px 20px;
margin-top:10px;
border-radius:8px;
cursor:pointer;
}

.msg{
color:#4CAF50;
margin-top:10px;
}

a{
color:var(--gold);
text-decoration:none;
border-bottom:1px dashed var(--gold);
}
</style>
</head>

<body>

<!-- ===== الباب ===== -->
<div id="portal">
  <div class="door left"></div>
  <div class="door right"></div>
  <div class="overlay"></div>

  <button class="enter-btn" onclick="openInvite()">اضغط للدخول</button>
</div>

<!-- ===== المحتوى ===== -->
<div id="content">

<p>يتشرف محمد & سحر بدعوتكم</p>
<h1 class="names">محمد & سحر</h1>
<p>لحضور كتب كتابهما</p>

<div class="card">
<p>📅 الاثنين 18 مايو 2026</p>
<p>🕓 الساعة 4:00 عصراً</p>
<p>📍 مسجد محمد فريد خميس</p>
<a href="https://www.google.com/maps?q=30.3005,31.7486" target="_blank">عرض الموقع</a>
</div>

<div id="timer">
<div class="timer-box"><span id="d">0</span>يوم</div>
<div class="timer-box"><span id="h">0</span>ساعة</div>
<div class="timer-box"><span id="m">0</span>دقيقة</div>
<div class="timer-box"><span id="s">0</span>ثانية</div>
</div>

<input id="name" placeholder="اكتب اسمك">
<button class="confirm" onclick="saveName()">تأكيد الحضور</button>
<div class="msg" id="msg"></div>

</div>

<script>

/* فتح الباب */
function openInvite(){
document.getElementById('portal').classList.add('open');

setTimeout(()=>{
document.getElementById('content').classList.add('show');
},1200);
}

/* التايمر */
const target=new Date("2026-05-18T16:00:00").getTime();

setInterval(()=>{
let now=new Date().getTime();
let diff=target-now;

if(diff>0){
document.getElementById('d').innerText=Math.floor(diff/86400000);
document.getElementById('h').innerText=Math.floor(diff%86400000/3600000);
document.getElementById('m').innerText=Math.floor(diff%3600000/60000);
document.getElementById('s').innerText=Math.floor(diff%60000/1000);
}

},1000);

/* تأكيد الحضور */
function saveName(){
let n=document.getElementById('name').value;
if(!n) return;

localStorage.setItem('guest',n);
document.getElementById('msg').innerText="تم تأكيد حضورك يا " + n;
document.getElementById('name').value="";
}

</script>

</body>
</html>
