<!DOCTYPE html><html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>دعوة كتب كتاب محمد وسحر</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap" rel="stylesheet"><style>
:root { --gold:#d4af37; --dark:#000; --cream:#fffdf2; }
body,html{
 margin:0; padding:0; height:100%; font-family:'Amiri',serif;
 background:#000; color:var(--cream); overflow:hidden;
}

/* شاشة البداية */
#portal{
 position:fixed; width:100%; height:100%;
 background:linear-gradient(rgba(0,0,0,.7),rgba(0,0,0,.9)),
 url('https://images.unsplash.com/photo-1529634894190-1a7caa1c96d6');
 background-size:cover; display:flex; justify-content:center; align-items:center;
 transition:1s;
}

#portal.hide{ opacity:0; transform:scale(1.2); pointer-events:none; }

button{
 background:var(--gold); border:none; padding:15px 40px;
 font-size:20px; border-radius:40px; cursor:pointer;
 box-shadow:0 0 20px rgba(212,175,55,.6);
}

/* المحتوى */
#content{
 position:absolute; width:100%; height:100%;
 display:flex; flex-direction:column; align-items:center;
 justify-content:center; text-align:center;
 background:linear-gradient(rgba(0,0,0,.8),rgba(0,0,0,.9));
 opacity:0; transition:1s;
}

#content.show{ opacity:1; }

.names{ font-size:3rem; color:var(--gold); }
.card{
 border:1px solid var(--gold);
 padding:20px; border-radius:15px; margin:20px;
 background:rgba(255,255,255,.05);
}

#timer{ display:flex; gap:10px; }
.timer-box{ border:1px solid var(--gold); padding:10px; border-radius:10px; }
.timer-box span{ display:block; font-size:22px; color:var(--gold); }

input{
 padding:10px; width:80%; margin-top:10px;
 border-radius:8px; border:none; text-align:center;
}

.success{ color:#4CAF50; margin-top:10px; }

</style></head><body><div id="portal">
 <button onclick="openInvite()">اضغط للدخول</button>
</div><div id="content">
 <p>يتشرف محمد & سحر بدعوتكم</p>
 <h1 class="names">محمد & سحر</h1>
 <p>لحضور كتب كتابهما</p> <div class="card">
  <p>📅 الاثنين 18 مايو 2026</p>
  <p>🕓 4:00 عصراً</p>
  <p>📍 مسجد محمد فريد خميس</p>
  <a href="https://maps.google.com/?q=مسجد+محمد+فريد+خميس" target="_blank">عرض الموقع</a>
 </div> <div id="timer">
  <div class="timer-box"><span id="d">0</span>يوم</div>
  <div class="timer-box"><span id="h">0</span>ساعة</div>
  <div class="timer-box"><span id="m">0</span>دقيقة</div>
  <div class="timer-box"><span id="s">0</span>ثانية</div>
 </div> <input id="name" placeholder="اكتب اسمك">
 <button onclick="saveName()">تأكيد الحضور</button>
 <div class="success" id="msg"></div>
</div><script>
function openInvite(){
 document.getElementById('portal').classList.add('hide');
 document.getElementById('content').classList.add('show');
}

/* تايمر */
const target=new Date("2026-05-18T16:00:00").getTime();
setInterval(()=>{
 let now=new Date().getTime();
 let diff=target-now;
 if(diff>0){
 document.getElementById('d').innerText=Math.floor(diff/86400000);
 document.getElementById('h').innerText=Math.floor(diff%86400000/3600000);
 document.getElementById('m').innerText=Math.floor(diff%3600000/60000);
 document.getElementById('s').innerText=Math.floor(diff%60000/1000);
 }
},1000);

/* حفظ الاسم */
function saveName(){
 let n=document.getElementById('name').value;
 if(!n) return;
 localStorage.setItem('guest',n);
 document.getElementById('msg').innerText="تم تأكيد حضورك يا "+n;
 document.getElementById('name').value="";
}
</script></body>
</html>
