<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دعوة زفاف محمد & سحر</title>
    
    <meta property="og:title" content="دعوة زفاف محمد & سحر">
    <meta property="og:description" content="ننتظركم بكل حب في ليلة العمر - 18 مايو 2026">
    <meta property="og:image" content="https://mhmdeltokhy00-lab.github.io/wedding-mohamed-sahar/gate.jpg">

    <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --dark: #000000; --cream: #fffdf2; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: 'Amiri', serif; background-color: var(--dark); color: var(--cream); }
        
        /* شاشة البوابة */
        #portal-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--dark) url('gate.jpg') no-repeat center center;
            background-size: cover; display: flex; justify-content: center; align-items: center; z-index: 999;
            transition: all 1.5s cubic-bezier(0.7, 0, 0.3, 1);
        }
        #portal-screen.open { transform: translateY(-100%); opacity: 0; pointer-events: none; }
        #knock-btn { background: rgba(0, 0, 0, 0.7); border: 2px solid var(--gold); color: var(--gold); padding: 15px 45px; font-size: 22px; cursor: pointer; border-radius: 50px; font-weight: bold; backdrop-filter: blur(8px); box-shadow: 0 0 25px rgba(212,175,55,0.5); position: absolute; bottom: 15%; }
        
        /* شاشة المحتوى */
        #content-screen {
            position: absolute; width: 100%; height: 100%;
            background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), url('gate.jpg');
            background-size: cover; background-position: center; overflow-y: auto; 
            display: flex; flex-direction: column; align-items: center; padding: 40px 20px; 
            box-sizing: border-box; text-align: center; visibility: hidden; opacity: 0; transition: opacity 1s ease-in;
        }
        #content-screen.visible { visibility: visible; opacity: 1; }

        /* تنسيق الصورة الشخصية */
        .couple-img-container { margin: 20px 0; position: relative; display: inline-block; }
        .couple-img { width: 220px; height: 280px; object-fit: cover; border-radius: 100px 100px 20px 20px; border: 3px solid var(--gold); box-shadow: 0 0 20px rgba(212,175,55,0.4); }
        .romantic-text { font-style: italic; font-size: 1.5rem; color: var(--gold); margin: 15px 0; max-width: 320px; line-height: 1.4; text-shadow: 1px 1px 2px black; }

        .names { font-size: 3.5rem; color: var(--gold); margin: 10px 0; }
        .card { border: 1px solid var(--gold); background: rgba(212, 175, 55, 0.08); padding: 20px; border-radius: 20px; width: 90%; max-width: 450px; margin: 15px 0; backdrop-filter: blur(10px); }
        
        /* العداد */
        #timer { display: flex; gap: 12px; margin: 20px 0; }
        .timer-unit { background: rgba(212, 175, 55, 0.15); border: 1px solid var(--gold); padding: 10px; border-radius: 12px; min-width: 65px; }
        .timer-unit span { display: block; font-size: 1.8rem; color: var(--gold); font-weight: bold; }
        
        /* الأزرار */
        .btn { text-decoration: none; padding: 12px 20px; border-radius: 10px; font-weight: bold; display: inline-block; margin: 5px; font-size: 1rem; cursor: pointer; transition: 0.3s; }
        .map-btn { background: var(--gold); color: black; border: 1px solid var(--gold); }
        .calendar-btn { background: transparent; color: var(--gold); border: 1px solid var(--gold); }
        .whatsapp-btn { background: #25D366; color: white; border: none; width: 90%; max-width: 400px; margin-top: 15px; font-size: 1.2rem; }
        
        input { width: 90%; max-width: 400px; padding: 15px; margin-bottom: 10px; background: rgba(255,255,255,0.1); border: 1px solid #555; color: white; border-radius: 10px; text-align: center; }
    </style>
</head>
<body>

    <audio id="weddingSong" src="song.mp3" loop></audio>

    <div id="portal-screen">
        <button id="knock-btn" onclick="openInvitation()">تفضلوا بالدخول</button>
    </div>

    <div id="content-screen">
        <h1 class="names">محمد & سحر</h1>
        
        <div class="couple-img-container">
            <img src="couple.jpg" class="couple-img" alt="محمد وسحر">
        </div>

        <div class="romantic-text">
            "في قلبِنا حكاية.. وفي يومِنا بداية..<br> نكتبُها معاً بوعودِ الوفاء"
        </div>

        <div class="card">
            <p>📅 الاثنين <strong>18 مايو 2026</strong></p>
            <p>🕓 الساعة <strong>4:00 عصراً</strong></p>
            <p>📍 <strong>مسجد محمد فريد خميس</strong></p>
            <p style="font-size: 0.9rem;">العاشر من رمضان - منطقة البنوك</p>
            
            <a href="https://www.google.com/maps/search/?api=1&query=مسجد+محمد+فريد+خميس+العاشر+من+رمضان" target="_blank" class="btn map-btn">📍 موقع المسجد</a>
            
            <a href="https://www.google.com/calendar/render?action=TEMPLATE&text=زفاف+محمد+وسحر&dates=20260518T130000Z/20260518T150000Z&details=ننتظركم+بكل+حب+في+حفل+زفافنا&location=مسجد+محمد+فريد+خميس،+العاشر+من+رمضان" target="_blank" class="btn calendar-btn">🗓️ أضف للمؤقت</a>
        </div>

        <div id="timer">
            <div class="timer-unit"><span id="days">00</span>يوم</div>
            <div class="timer-unit"><span id="hours">00</span>ساعة</div>
            <div class="timer-unit"><span id="mins">00</span>دقيقة</div>
        </div>

        <div style="width: 100%; display: flex; flex-direction: column; align-items: center; margin-top: 10px;">
            <input type="text" id="gName" placeholder="أدخل اسمك الكريم لتأكيد الحضور">
            <button class="btn whatsapp-btn" onclick="confirmGuest()">تأكيد الحضور عبر واتساب ✅</button>
            <p id="msg" style="color: #4CAF50; margin-top: 10px; font-weight: bold;"></p>
        </div>

        <p style="margin-top: 40px; opacity: 0.6; font-size: 1rem;">دامت دياركم عامرة بالأفراح</p>
    </div>

    <script>
        function openInvitation() {
            const audio = document.getElementById('weddingSong');
            audio.play().catch(e => console.log("Audio logic"));
            document.getElementById('portal-screen').classList.add('open');
            document.getElementById('content-screen').classList.add('visible');
        }

        // العداد التنازلي
        const target = new Date("May 18, 2026 16:00:00").getTime();
        setInterval(() => {
            const now = new Date().getTime();
            const diff = target - now;
            if(diff > 0) {
                document.getElementById('days').innerText = Math.floor(diff / (1000 * 60 * 60 * 24));
                document.getElementById('hours').innerText = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                document.getElementById('mins').innerText = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            }
        }, 1000);

        // تأكيد الحضور واتساب
        function confirmGuest() {
            const name = document.getElementById('gName').value;
            const myNumber = "201003141420"; 
            if(name.trim() !== "") {
                const msg = `أهلاً يا عريس، أنا ${name}، بأكد لك حضوري الفرح إن شاء الله. ألف مبروك!`;
                window.open(`https://wa.me/${myNumber}?text=${encodeURIComponent(msg)}`, '_blank');
            } else { alert("يرجى إدخال الاسم أولاً"); }
        }
    </script>
</body>
</html>
