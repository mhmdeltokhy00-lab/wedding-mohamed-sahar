<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دعوة زفاف محمد وسحر</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --cream: #fffdf2;
            --dark: #000000;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Amiri', serif;
            background-color: var(--dark);
            color: var(--cream);
        }

        /* شاشة البوابة */
        #portal-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('./gate.png') no-repeat center center;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transition: all 1.5s cubic-bezier(0.7, 0, 0.3, 1);
        }

        #portal-screen.open {
            transform: scale(2);
            opacity: 0;
            pointer-events: none;
        }

        #knock-btn {
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid var(--gold);
            color: var(--gold);
            padding: 15px 40px;
            font-size: 22px;
            cursor: pointer;
            border-radius: 50px;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.5);
            transition: 0.3s;
            position: absolute;
            bottom: 15%;
            font-weight: bold;
            backdrop-filter: blur(5px);
        }

        /* شاشة المحتوى الداخلي */
        #content-screen {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), url('./gate.png');
            background-size: cover;
            background-position: center;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px 20px;
            box-sizing: border-box;
            text-align: center;
        }

        .header { color: var(--gold); margin-bottom: 20px; }
        .names { font-size: 3.5rem; margin: 10px 0; text-shadow: 0 0 10px rgba(212,175,55,0.5); }
        
        .card {
            border: 1px solid var(--gold);
            background: rgba(212, 175, 55, 0.05);
            padding: 25px;
            border-radius: 15px;
            width: 90%;
            max-width: 450px;
            margin: 20px 0;
        }

        .card p { font-size: 1.4rem; margin: 10px 0; line-height: 1.6; }
        
        /* العداد */
        #timer { display: flex; gap: 15px; margin: 20px 0; }
        .timer-unit {
            background: rgba(212, 175, 55, 0.1);
            border: 1px solid var(--gold);
            padding: 10px;
            border-radius: 10px;
            min-width: 65px;
        }
        .timer-unit span { display: block; font-size: 1.8rem; color: var(--gold); font-weight: bold; }

        .map-btn {
            display: inline-block;
            margin-top: 15px;
            color: var(--gold);
            text-decoration: none;
            border-bottom: 1px dashed var(--gold);
            font-size: 1.1rem;
        }

        #rsvp-section {
            margin-top: 30px;
            width: 90%;
            max-width: 400px;
        }

        input {
            width: 100%; padding: 12px; margin-bottom: 10px;
            background: rgba(255,255,255,0.1); border: 1px solid #444;
            color: white; border-radius: 8px; text-align: center;
        }

        .confirm-btn {
            background: var(--gold); color: black; border: none;
            padding: 12px 30px; border-radius: 8px; cursor: pointer;
            width: 100%; font-weight: bold; font-size: 1.1rem;
        }

    </style>
</head>
<body>

    <div id="portal-screen">
        <button id="knock-btn" onclick="openDoor()">تفضلوا بالدخول</button>
    </div>

    <div id="content-screen">
        <div class="header">
            <p style="font-size: 1.3rem;">يتشرف محمد & سحر بدعوتكم</p>
            <h1 class="names">محمد & سحر</h1>
            <p>لحضور حفل زفافهما المبارك</p>
        </div>

        <div class="card">
            <p>📅 الاثنين <strong>18 مايو 2026</strong></p>
            <p>🕓 الساعة <strong>4:00 عصراً</strong></p>
            <p>📍 <strong>مسجد محمد فريد خميس</strong></p>
            <p>العاشر من رمضان - منطقة البنوك</p>
            <a href="https://maps.app.goo.gl/uXv7oY7Pz5zV7qfA8" target="_blank" class="map-btn">📍 اضغط هنا لفتح الموقع على الخريطة</a>
        </div>

        <div id="timer">
            <div class="timer-unit"><span id="days">00</span>يوم</div>
            <div class="timer-unit"><span id="hours">00</span>ساعة</div>
            <div class="timer-unit"><span id="mins">00</span>دقيقة</div>
        </div>

        <div id="rsvp-section">
            <p>يسعدنا تأكيد حضوركم</p>
            <input type="text" id="guestName" placeholder="أدخل اسمك الكريم">
            <button class="confirm-btn" onclick="confirm()">تأكيد الحضور</button>
            <p id="msg" style="color: #4CAF50; margin-top: 10px;"></p>
        </div>

        <p style="margin-top: 50px; opacity: 0.5; font-size: 0.9rem;">دامت دياركم عامرة بالأفراح</p>
    </div>

    <script>
        function openDoor() {
            document.getElementById('portal-screen').classList.add('open');
        }

        // حساب الوقت
        const target = new Date("May 18, 2026 16:00:00").getTime();
        setInterval(() => {
            const now = new Date().getTime();
            const diff = target - now;
            if(diff > 0) {
                document.getElementById('days').innerText = Math.floor(diff / (1000 * 60 * 60 * 24));
                document.getElementById('hours').innerText = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                document.getElementById('mins').innerText = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            }
        }, 1000);

        function confirm() {
            const name = document.getElementById('guestName').value;
            if(name) {
                document.getElementById('msg').innerText = "تم تأكيد حضورك، ننتظرك بكل حب يا أ/ " + name;
                document.getElementById('guestName').value = "";
            }
        }
    </script>
</body>
</html>
